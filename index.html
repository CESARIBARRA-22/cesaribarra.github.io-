<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cesar Ibarra</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(270deg, #ff0000, #00ffcc, #0066ff, #ff00ff);
        background-size: 800% 800%;
        animation: fondoRGB 10s ease infinite;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    @keyframes fondoRGB {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .card {
        background: rgba(0,0,0,0.7);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 30px rgba(0,255,255,0.5);
        max-width: 400px;
    }

    .foto {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #00ffff;
        box-shadow: 0 0 20px #00ffff;
        margin-bottom: 20px;
    }

    h1 {
        margin-bottom: 10px;
        font-size: 28px;
    }

    p {
        font-size: 14px;
        color: #ccc;
    }

    .boton {
        display: inline-block;
        margin-top: 25px;
        padding: 15px 30px;
        border-radius: 12px;
        background: linear-gradient(90deg, #00ffff, #ff00ff);
        color: black;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
        box-shadow: 0 0 15px #00ffff;
        cursor: pointer;
    }

    .boton:hover {
        transform: scale(1.1);
        box-shadow: 0 0 25px #ff00ff;
    }

    .subtexto {
        font-size: 12px;
        display: block;
        margin-top: 5px;
        color: #222;
    }

</style>
</head>

<body>

<div class="card">

    <img src="foto.jpg" class="foto">

    <h1>Cesar Ibarra</h1>

    <p>Página personal de contacto</p>

    <!-- BOTÓN CORREGIDO -->
    <a class="boton" onclick="abrirCorreo()">
        Contactarme a mi correo personal
        <span class="subtexto">Pulsa aquí</span>
    </a>

</div>

<!-- SCRIPT INTELIGENTE -->
<script>
function abrirCorreo() {
    var esMovil = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if (esMovil) {
        window.location.href = "mailto:cesaribarragonzalez508@gmail.com?subject=Contacto&body=Hola Cesar, quiero comunicarme contigo por...";
    } else {
        window.open("https://mail.google.com/mail/?view=cm&fs=1&to=cesaribarragonzalez508@gmail.com&su=Contacto&body=Hola Cesar, quiero comunicarme contigo por...", "_blank");
    }
}
</script>

</body>
</html>
